<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TheGriminator's Cool Site</title>
  <style>
    /* Background & font */
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    /* Big title */
    h1 {
      font-size: 3em;
      margin-top: 80px;
      text-shadow: 2px 2px 8px #000;
    }

    /* Cool button style */
    .button {
      display: inline-block;
      background-color: #ff4b2b;
      background-image: linear-gradient(to right, #ff416c, #ff4b2b);
      border: none;
      color: white;
      padding: 20px 40px;
      font-size: 1.5em;
      margin: 40px 20px;
      cursor: pointer;
      border-radius: 15px;
      transition: 0.3s;
      text-decoration: none;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .button:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    /* Footer text */
    p {
      margin-top: 60px;
      font-size: 1em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>TheGriminator's Hangout</h1>
  <a class="button" href="https://discord.com/users/YOURDISCORDID" target="_blank">Join my Discord</a>
  <p>Made by TheGriminator — stay awesome!</p>
</body>
</html>
